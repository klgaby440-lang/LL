<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llink | FLOW LAB</title>
    <!-- Bibliothèques -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
    
    <style>
        /* RESET TOTAL ABSOLU : ZÉRO MARGE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        
        :root {
            --noir: #1E1E24;
            --campagne: #FAFAFA;
            --texte: #1E1E24;
            --texte-clair: #666666;
            --input-bg: #EBEBEB;
            --bot-bg: #F0F4F9;
            --user-bg: #E3E3E3;
            --radius-full: 50px;
            --radius-m: 24px;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body.dark-mode {
            --noir: #FAFAFA;
            --campagne: #131314;
            --texte: #E3E3E3;
            --texte-clair: #A0A0A0;
            --input-bg: #1E1F20;
            --bot-bg: #1E1F20;
            --user-bg: #2B2C2F;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--campagne);
            color: var(--texte);
            display: flex;
            transition: background-color 0.3s ease;
        }

        /* --- SIDEBAR (HISTORIQUE FLUIDE) --- */
        #sidebar {
            position: fixed; left: -320px; top: 0; width: 320px; height: 100%;
            background: var(--input-bg); border-right: none;
            z-index: 1000; transition: var(--transition);
            display: flex; flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
        }
        #sidebar.active { left: 0; }

        .sidebar-header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 1.2rem; font-weight: 600; }
        
        .history-list { flex-grow: 1; overflow-y: auto; padding: 10px 15px; }
        
        .history-item {
            padding: 12px 18px; border-radius: var(--radius-full);
            cursor: pointer; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            background: transparent; transition: 0.2s;
        }
        .history-item:hover { background: rgba(0,0,0,0.05); }
        .history-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; font-size: 0.95rem; }
        .history-actions i { width: 16px; height: 16px; color: var(--texte-clair); margin-left: 10px; cursor: pointer; }
        .history-actions i:hover { color: var(--texte); }

        /* --- CONTENU PRINCIPAL --- */
        #main-content {
            flex-grow: 1; display: flex; flex-direction: column;
            width: 100%; position: relative; height: 100%;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: transparent; z-index: 10;
        }

        .btn-icon {
            background: transparent; border: none; color: var(--texte);
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-icon:hover { background: var(--input-bg); }
        .btn-pill {
            background: var(--input-bg); border: none; color: var(--texte);
            padding: 10px 20px; border-radius: var(--radius-full);
            cursor: pointer; font-weight: 500; transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-pill:hover { filter: brightness(0.95); }

        /* --- ZONE DE CHAT (STYLE GEMINI) --- */
        #chat-window {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
            max-width: 900px; margin: 0 auto; width: 100%; scroll-behavior: smooth;
        }

        .msg-wrapper { display: flex; width: 100%; }
        .msg-wrapper.user { justify-content: flex-end; }
        .msg-wrapper.bot { justify-content: flex-start; }

        .msg {
            max-width: 80%; padding: 16px 22px; font-size: 1rem; line-height: 1.6;
        }
        .msg.user {
            background: var(--user-bg); color: var(--texte);
            border-radius: 24px 24px 4px 24px;
        }
        .msg.bot {
            background: transparent; color: var(--texte);
            border-radius: 24px 24px 24px 4px;
        }

        /* --- ÉTAT VIDE (LOGO 6 CERCLES) --- */
        #empty-state {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; animation: fadeIn 0.8s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        
        .logo-text {
            font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #4285f4, #d96570);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 15px; letter-spacing: 1px;
        }

        /* --- BARRE D'ENTRÉE --- */
        .input-area { padding: 15px 20px 30px 20px; background: var(--campagne); }
        .input-group {
            display: flex; align-items: flex-end; gap: 10px;
            max-width: 900px; margin: 0 auto; background: var(--input-bg);
            border-radius: var(--radius-m); padding: 10px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        textarea {
            flex-grow: 1; background: transparent; border: none; color: var(--texte);
            padding: 12px 5px; resize: none; height: 48px; max-height: 200px;
            outline: none; font-size: 1rem; line-height: 1.5;
        }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .online-dot { background: #34A853; }
        .offline-dot { background: #EA4335; }

        /* --- MODALES --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-box {
            background: var(--campagne); padding: 30px; border-radius: var(--radius-m);
            width: 90%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .modal-input {
            width: 100%; padding: 12px 15px; border-radius: 12px;
            border: 1px solid var(--texte-clair); background: transparent; color: var(--texte);
            margin: 15px 0; outline: none;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Llink</h2>
            <button class="btn-icon" onclick="toggleSidebar()"><i data-lucide="x"></i></button>
        </div>
        <div style="padding: 0 15px;">
            <button class="btn-pill" style="width: 100%; justify-content: center; background:var(--noir); color:var(--campagne);" onclick="newConversation()">
                <i data-lucide="plus"></i> Nouvelle discussion
            </button>
        </div>
        <div class="history-list" id="history"></div>
        <div style="padding: 20px 15px;">
            <button class="btn-pill" style="width: 100%; justify-content: flex-start;" onclick="toggleTheme()">
                <i data-lucide="moon"></i> Changer de thème
            </button>
        </div>
    </div>

    <!-- MAIN -->
    <div id="main-content">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="btn-icon" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
                <div class="btn-pill" id="mode-btn" onclick="toggleMode()" style="cursor:pointer;">
                    <i data-lucide="message-square"></i> Chat
                </div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-pill" id="conn-btn" onclick="toggleOnline()">
                    <span class="status-dot online-dot" id="network-status"></span> En Ligne
                </button>
            </div>
        </header>

        <div id="chat-window">
            <!-- État vide inséré par JS -->
        </div>

        <div class="input-area">
            <div class="input-group">
                <button class="btn-icon" onclick="document.getElementById('file-in').click()"><i data-lucide="image"></i></button>
                <textarea id="user-msg" placeholder="Demandez n'importe quoi à Llink..." oninput="this.style.height='48px';this.style.height=this.scrollHeight+'px'"></textarea>
                <button class="btn-icon" onclick="send()" style="background:var(--noir); color:var(--campagne); width:40px; height:40px;"><i data-lucide="send" style="width:18px;"></i></button>
            </div>
        </div>
    </div>

    <!-- MODALE RENOMMER -->
    <div id="rename-modal" class="modal">
        <div class="modal-box">
            <h3 style="font-weight: 600;">Renommer la discussion</h3>
            <input type="text" id="rename-input" class="modal-input" placeholder="Nouveau nom...">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn-pill" onclick="closeModal('rename-modal')">Annuler</button>
                <button class="btn-pill" style="background:var(--noir); color:var(--campagne);" onclick="saveChatName()">Enregistrer</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-in" style="display:none" accept="image/*">

    <!-- TRANSFORMERS.JS (HORS-LIGNE) -->
    <script type="module">
        import { env, pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers';
        env.allowLocalModels = true;
        env.allowRemoteModels = false; 
        env.localModelPath = './models/'; // Pense à bien mettre ton dossier au même niveau que l'index

        window.generateOfflineText = async (prompt) => {
            if(!window.localAI) {
                console.log("Chargement du modèle ONNX local...");
                window.localAI = await pipeline('text-generation', 'qwen-0.5b', { device: 'wasm', dtype: 'q4' });
            }
            const out = await window.localAI(prompt, { max_new_tokens: 150 });
            return out[0].generated_text.replace(prompt, '').trim();
        };
    </script>

    <script>
        // CONFIGURATION DB (Version 2 pour ajouter le mode)
        const db = new Dexie("LlinkDB");
        db.version(2).stores({ 
            chats: '++id, title, time, mode', 
            msgs: '++id, chatId, role, text' 
        });

        const SERVER_URL = "https://llink-usz9.onrender.com";
        let curChatId = null;
        let isOnline = true;
        let currentMode = 'chat'; // 'chat' ou 'translate'
        let chatToRename = null;

        // --- SVG LOGO ---
        const emptyStateHTML = `
            <div id="empty-state">
                <svg width="120" height="120" viewBox="0 0 100 100">
                    <circle cx="50" cy="20" r="10" fill="none" stroke="var(--texte)" stroke-width="2.5"/>
                    <circle cx="76" cy="35" r="10" fill="none" stroke="var(--texte)" stroke-width="2.5"/>
                    <circle cx="76" cy="65" r="10" fill="none" stroke="var(--texte)" stroke-width="2.5"/>
                    <circle cx="50" cy="80" r="10" fill="none" stroke="var(--texte)" stroke-width="2.5"/>
                    <circle cx="24" cy="65" r="10" fill="none" stroke="var(--texte)" stroke-width="2.5"/>
                    <circle cx="24" cy="35" r="10" fill="none" stroke="var(--texte)" stroke-width="2.5"/>
                </svg>
                <div class="logo-text">Llink</div>
            </div>`;

        async function newConversation() {
            curChatId = null;
            document.getElementById('chat-window').innerHTML = emptyStateHTML;
            if(window.innerWidth < 768) toggleSidebar();
        }

        async function loadHistory() {
            const h = await db.chats.where('mode').equals(currentMode).reverse().toArray();
            document.getElementById('history').innerHTML = h.map(c => `
                <div class="history-item">
                    <div class="history-title" onclick="switchChat(${c.id})">${c.title}</div>
                    <div class="history-actions">
                        <i data-lucide="edit-2" onclick="openRenameModal(${c.id}, '${c.title.replace(/'/g, "\\'")}')"></i>
                        <i data-lucide="trash-2" onclick="deleteChat(${c.id})"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function switchChat(id) {
            curChatId = id;
            const m = await db.msgs.where('chatId').equals(id).toArray();
            const w = document.getElementById('chat-window');
            if(m.length === 0) {
                w.innerHTML = emptyStateHTML;
            } else {
                w.innerHTML = m.map(msg => `
                    <div class="msg-wrapper ${msg.role}">
                        <div class="msg ${msg.role}">${msg.text.replace(/\n/g, '<br>')}</div>
                    </div>
                `).join('');
            }
            if(window.innerWidth < 768) toggleSidebar();
            scrollToBottom();
        }

        async function send() {
            const txt = document.getElementById('user-msg').value;
            if(!txt.trim()) return;

            if(!curChatId) {
                curChatId = await db.chats.add({ title: txt.substring(0, 20) + "...", time: Date.now(), mode: currentMode });
                document.getElementById('chat-window').innerHTML = ''; // Enlève le logo
                loadHistory();
            }

            // Affiche le message utilisateur
            await db.msgs.add({ chatId: curChatId, role: 'user', text: txt });
            renderMessage(txt, 'user');
            
            document.getElementById('user-msg').value = '';
            document.getElementById('user-msg').style.height = '48px';
            
            // Bulle de chargement
            const loadingId = "load-" + Date.now();
            renderMessage("Réflexion en cours...", 'bot', loadingId);

            let reply = "";

            if(isOnline) {
                // APPEL AU SERVEUR RENDER
                try {
                    const formData = new FormData();
                    formData.append('message', txt);
                    formData.append('mode', currentMode);

                    const response = await fetch(`${SERVER_URL}/api/chat`, { method: 'POST', body: formData });
                    const data = await response.json();
                    reply = data.response || "Erreur de réponse du serveur.";
                } catch(e) {
                    reply = "Erreur de connexion au serveur. Essaie de passer en mode Hors-Ligne.";
                }
            } else {
                // APPEL AU MODÈLE LOCAL (TRANSFORMERS.JS)
                try {
                    if(window.generateOfflineText) {
                        reply = await window.generateOfflineText(txt);
                    } else {
                        reply = "Le modèle IA hors-ligne est en cours de chargement. Patiente un instant.";
                    }
                } catch (error) {
                    reply = "Erreur lors de la génération locale : " + error.message;
                }
            }

            // Remplace le message de chargement par la vraie réponse
            document.getElementById(loadingId).innerHTML = `<div class="msg bot">${reply.replace(/\n/g, '<br>')}</div>`;
            await db.msgs.add({ chatId: curChatId, role: 'bot', text: reply });
            scrollToBottom();
        }

        // TESSERACT OCR INTELLIGENT (Online / Offline)
        document.getElementById('file-in').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            const loadingId = "load-" + Date.now();
            renderMessage("🖼️ Analyse de l'image...", 'bot', loadingId);

            let extractedText = "";

            if(isOnline) {
                // Envoi vers Render (GML_OCR simulé)
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    const res = await fetch(`${SERVER_URL}/api/ocr`, { method: 'POST', body: formData });
                    const data = await res.json();
                    extractedText = data.response || "Image analysée.";
                } catch(err) {
                    extractedText = "Échec du serveur en ligne. L'analyse Tesseract locale prend le relais...";
                }
            } 
            
            // Si hors-ligne ou si le serveur a échoué, on utilise Tesseract local
            if(!isOnline || extractedText.includes("relais")) {
                const { data: { text } } = await Tesseract.recognize(file, 'fra+eng');
                extractedText = text || "Aucun texte détecté.";
            }

            document.getElementById(loadingId).remove();
            document.getElementById('user-msg').value = extractedText;
            document.getElementById('user-msg').focus();
        });

        // --- FONCTIONS UTILITAIRES ---
        function renderMessage(txt, role, id = "") {
            const w = document.getElementById('chat-window');
            if(document.getElementById('empty-state')) document.getElementById('empty-state').remove();
            
            w.innerHTML += `
                <div class="msg-wrapper ${role}" id="${id}">
                    <div class="msg ${role}">${txt.replace(/\n/g, '<br>')}</div>
                </div>`;
            scrollToBottom();
        }

        function scrollToBottom() {
            const w = document.getElementById('chat-window');
            w.scrollTop = w.scrollHeight;
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function toggleOnline() {
            isOnline = !isOnline;
            const btn = document.getElementById('conn-btn');
            const dot = document.getElementById('network-status');
            if(isOnline) {
                dot.className = "status-dot online-dot";
                btn.innerHTML = `<span class="status-dot online-dot" id="network-status"></span> En Ligne`;
            } else {
                dot.className = "status-dot offline-dot";
                btn.innerHTML = `<span class="status-dot offline-dot" id="network-status"></span> Hors Ligne`;
            }
        }

        async function toggleMode() {
            currentMode = currentMode === 'chat' ? 'translate' : 'chat';
            const btn = document.getElementById('mode-btn');
            btn.innerHTML = currentMode === 'chat' ? '<i data-lucide="message-square"></i> Chat' : '<i data-lucide="languages"></i> Traduction';
            lucide.createIcons();
            await newConversation();
            loadHistory();
        }

        // --- GESTION DES NOMS DE CONVERSATION ---
        function openRenameModal(id, currentName) {
            chatToRename = id;
            document.getElementById('rename-input').value = currentName;
            document.getElementById('rename-modal').style.display = 'flex';
        }

        async function saveChatName() {
            const newName = document.getElementById('rename-input').value.trim();
            if(newName && chatToRename) {
                await db.chats.update(chatToRename, { title: newName });
                loadHistory();
            }
            closeModal('rename-modal');
        }

        async function deleteChat(id) {
            if(confirm("Supprimer cette discussion ?")) {
                await db.chats.delete(id);
                await db.msgs.where('chatId').equals(id).delete();
                if(curChatId === id) newConversation();
                loadHistory();
            }
        }

        // Démarrage
        lucide.createIcons();
        newConversation();
        loadHistory();
    </script>
</body>
</html>
